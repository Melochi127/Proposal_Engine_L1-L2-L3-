<svg viewBox="0 0 1000 900" width="1000" height="900">
                <defs>
                    <filter id="softShadow5" x="-50%" y="-50%" width="200%" height="200%">
                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
                    </filter>
                </defs>
                <!-- Title -->
                <text x="500" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#5a6f8f">
                    SESSION STATE MACHINE - FIELD PROGRESSION
                </text>

                <!-- State display -->
                <rect x="50" y="60" width="900" height="70" fill="#f8f9fb" stroke="#e0e0e0" stroke-width="1" rx="5"/>
                <text x="500" y="80" font-size="11" font-weight="bold" text-anchor="middle" fill="#5a6f8f">Current State:</text>
                <text x="500" y="100" font-size="11" text-anchor="middle" fill="#5a6f8f">
                    level = "L3" | phase = "phase_1" | field_index = 0 | all_complete = False
                </text>

                <!-- Arrow -->
                <line x1="500" y1="130" x2="500" y2="160" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>

                <!-- Loop title -->
                <rect x="200" y="160" width="600" height="40" fill="#c9a5b5" stroke="#9f7d8f" stroke-width="1.5" rx="5" filter="url(#softShadow5)"/>
                <text x="500" y="185" font-size="12" font-weight="bold" text-anchor="middle" fill="white">LOOP: While not all_complete</text>

                <!-- Arrow -->
                <line x1="500" y1="200" x2="500" y2="230" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>

                <!-- Get Field -->
                <rect x="250" y="230" width="500" height="70" fill="#8ab4d5" stroke="#6b8db3" stroke-width="1.5" rx="5" filter="url(#softShadow5)"/>
                <text x="500" y="255" font-size="12" font-weight="bold" text-anchor="middle" fill="white">GET CURRENT FIELD</text>
                <text x="500" y="275" font-size="11" text-anchor="middle" fill="white">
                    phases = get_phase_fields(session.current_phase)
                </text>
                <text x="500" y="292" font-size="11" text-anchor="middle" fill="white">
                    field = phases[session.current_field_index]
                </text>

                <!-- Arrow -->
                <line x1="500" y1="300" x2="500" y2="330" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>

                <!-- Display & Get Answer -->
                <rect x="150" y="330" width="700" height="60" fill="#d9b896" stroke="#b09070" stroke-width="1.5" rx="5" filter="url(#softShadow5)"/>
                <text x="500" y="355" font-size="12" font-weight="bold" text-anchor="middle" fill="white">DISPLAY QUESTION & GET ANSWER</text>
                <text x="500" y="373" font-size="11" text-anchor="middle" fill="white">field.question → user.input → answer</text>

                <!-- Arrow -->
                <line x1="500" y1="390" x2="500" y2="420" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>

                <!-- Process -->
                <rect x="200" y="420" width="600" height="70" fill="#d9a896" stroke="#b08070" stroke-width="1.5" rx="5" filter="url(#softShadow5)"/>
                <text x="500" y="445" font-size="12" font-weight="bold" text-anchor="middle" fill="white">PROCESS ANSWER</text>
                <text x="500" y="465" font-size="11" text-anchor="middle" fill="white">
                    session.slots[field.key] = answer | check_risks(session.slots) | invoke_llm()
                </text>

                <!-- Arrow -->
                <line x1="500" y1="490" x2="500" y2="520" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>

                <!-- Decision Advance -->
                <polygon points="500,520 580,570 500,620 420,570" fill="#d9c89c" stroke="#b09070" stroke-width="1.5" filter="url(#softShadow5)"/>
                <text x="500" y="575" font-size="11" font-weight="bold" text-anchor="middle" fill="#5a6f8f">ADVANCE?</text>

                <!-- No - Clarify loop -->
                <line x1="420" y1="570" x2="150" y2="570" stroke="#8fa6bb" stroke-width="2"/>
                <line x1="150" y1="570" x2="150" y2="360" stroke="#8fa6bb" stroke-width="2"/>
                <line x1="150" y1="360" x2="250" y2="360" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>
                <text x="180" y="465" font-size="10" font-weight="bold" fill="#8fa6bb">NO (limit 1)</text>

                <!-- Yes - Advance -->
                <line x1="500" y1="620" x2="500" y2="650" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>
                <text x="520" y="640" font-size="10" font-weight="bold" fill="#7fb3b8">YES</text>

                <!-- Increment -->
                <rect x="300" y="650" width="400" height="60" fill="#b3a6be" stroke="#8b7e96" stroke-width="1.5" rx="5" filter="url(#softShadow5)"/>
                <text x="500" y="670" font-size="11" font-weight="bold" text-anchor="middle" fill="white">INCREMENT FIELD INDEX</text>
                <text x="500" y="688" font-size="11" text-anchor="middle" fill="white">session.current_field_index++</text>

                <!-- Arrow -->
                <line x1="500" y1="710" x2="500" y2="740" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>

                <!-- Check if complete -->
                <polygon points="500,740 580,790 500,840 420,790" fill="#d9c89c" stroke="#b09070" stroke-width="1.5" filter="url(#softShadow5)"/>
                <text x="500" y="795" font-size="10" font-weight="bold" text-anchor="middle" fill="#5a6f8f">
                    index ≥
                </text>
                <text x="500" y="810" font-size="10" font-weight="bold" text-anchor="middle" fill="#5a6f8f">
                    phase_len?
                </text>

                <!-- No - Continue loop -->
                <line x1="420" y1="790" x2="50" y2="790" stroke="#8fa6bb" stroke-width="2"/>
                <line x1="50" y1="790" x2="50" y2="265" stroke="#8fa6bb" stroke-width="2"/>
                <line x1="50" y1="265" x2="250" y2="265" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>
                <text x="100" y="780" font-size="10" font-weight="bold" fill="#8fa6bb">NO</text>

                <!-- Yes - Next Phase -->
                <line x1="500" y1="840" x2="500" y2="870" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead5)"/>
                <text x="520" y="860" font-size="10" font-weight="bold" fill="#7fb3b8">YES</text>

                <!-- Next Phase -->
                <rect x="250" y="870" width="500" height="50" fill="#8abcc9" stroke="#6b94a0" stroke-width="1.5" rx="5" filter="url(#softShadow5)"/>
                <text x="500" y="897" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Next phase OR set all_complete=True</text>

                <defs>
                    <marker id="arrowhead5" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
                        <polygon points="0 0, 10 5, 0 10" fill="#8fa6bb" />
                    </marker>
                </defs>
            </svg>