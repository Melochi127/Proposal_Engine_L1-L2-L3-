<svg viewBox="0 0 800 1200" width="800" height="1200">
                <defs>
                    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
                    </filter>
                </defs>
                <!-- Title -->
                <text x="400" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#5a6f8f">
                    USER JOURNEY - COMPLETE FLOW
                </text>

                <!-- Start -->
                <rect x="300" y="60" width="200" height="50" fill="#98d8c8" stroke="#6ba9a0" stroke-width="1.5" rx="25" filter="url(#softShadow)"/>
                <text x="400" y="90" font-size="14" font-weight="bold" text-anchor="middle" fill="white">User Opens App</text>

                <!-- Arrow -->
                <line x1="400" y1="110" x2="400" y2="140" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- Select Level -->
                <rect x="250" y="140" width="300" height="60" fill="#8ab4d5" stroke="#6b8db3" stroke-width="1.5" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="165" font-size="13" font-weight="bold" text-anchor="middle" fill="white">SELECT PROPOSAL LEVEL</text>
                <text x="400" y="185" font-size="11" text-anchor="middle" fill="white">L1 (8Q) | L2 (15Q) | L3 (35+Q)</text>

                <!-- Arrow -->
                <line x1="400" y1="200" x2="400" y2="230" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- Create Session -->
                <rect x="250" y="230" width="300" height="60" fill="#d9b896" stroke="#b09070" stroke-width="1.5" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="255" font-size="13" font-weight="bold" text-anchor="middle" fill="white">CREATE SESSION</text>
                <text x="400" y="275" font-size="11" text-anchor="middle" fill="white">session_id = df_YYYYMMDDhhmmss</text>

                <!-- Arrow -->
                <line x1="400" y1="290" x2="400" y2="320" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- Greeting -->
                <rect x="250" y="320" width="300" height="50" fill="#b3a6be" stroke="#8b7e96" stroke-width="1.5" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="350" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Display Greeting</text>

                <!-- Arrow -->
                <line x1="400" y1="370" x2="400" y2="400" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- LOOP START -->
                <rect x="200" y="400" width="400" height="50" fill="#c9a5b5" stroke="#9f7d8f" stroke-width="2" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="430" font-size="14" font-weight="bold" text-anchor="middle" fill="white">LOOP: Answer Questions</text>

                <!-- Arrow -->
                <line x1="400" y1="450" x2="400" y2="480" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- Display Question -->
                <rect x="250" y="480" width="300" height="50" fill="#8ab4d5" stroke="#6b8db3" stroke-width="1.5" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="510" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Display Question</text>

                <!-- Arrow -->
                <line x1="400" y1="530" x2="400" y2="560" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- User Input -->
                <rect x="250" y="560" width="300" height="50" fill="#98d8c8" stroke="#6ba9a0" stroke-width="1.5" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="590" font-size="13" font-weight="bold" text-anchor="middle" fill="white">User Input / Command</text>

                <!-- Arrow -->
                <line x1="400" y1="610" x2="400" y2="640" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- Process & Check Risks -->
                <rect x="150" y="640" width="500" height="70" fill="#d9a896" stroke="#b08070" stroke-width="1.5" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="665" font-size="13" font-weight="bold" text-anchor="middle" fill="white">PROCESS ANSWER & CHECK RISKS</text>
                <text x="400" y="685" font-size="11" text-anchor="middle" fill="white">Store • Fill defaults • Check 25 rules • Invoke LLM</text>
                <text x="400" y="700" font-size="11" text-anchor="middle" fill="white">Parse ADVANCE/CLARIFY signal</text>

                <!-- Arrow -->
                <line x1="400" y1="710" x2="400" y2="740" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- Display Response -->
                <rect x="200" y="740" width="400" height="60" fill="#b3a6be" stroke="#8b7e96" stroke-width="1.5" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="765" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Display AI Response</text>
                <text x="400" y="785" font-size="11" text-anchor="middle" fill="white">Include: Acknowledgment + Risk Warnings</text>

                <!-- Arrow down -->
                <line x1="400" y1="800" x2="400" y2="830" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- Decision: All Done? -->
                <polygon points="400,830 480,880 400,930 320,880" fill="#d9c89c" stroke="#b09070" stroke-width="1.5" filter="url(#softShadow)"/>
                <text x="400" y="885" font-size="12" font-weight="bold" text-anchor="middle" fill="#5a6f8f">ALL DONE?</text>

                <!-- No arrow (back to loop) -->
                <line x1="320" y1="880" x2="150" y2="880" stroke="#8fa6bb" stroke-width="2"/>
                <line x1="150" y1="880" x2="150" y2="425" stroke="#8fa6bb" stroke-width="2"/>
                <line x1="150" y1="425" x2="200" y2="425" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>
                <text x="100" y="650" font-size="11" font-weight="bold" fill="#8fa6bb">NO</text>

                <!-- Yes arrow -->
                <line x1="400" y1="930" x2="400" y2="960" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>
                <text x="420" y="950" font-size="11" font-weight="bold" fill="#7fb3b8">YES</text>

                <!-- Generate -->
                <rect x="250" y="960" width="300" height="50" fill="#8abcc9" stroke="#6b94a0" stroke-width="1.5" rx="5" filter="url(#softShadow)"/>
                <text x="400" y="990" font-size="13" font-weight="bold" text-anchor="middle" fill="white">Generate Proposal</text>

                <!-- Arrow -->
                <line x1="400" y1="1010" x2="400" y2="1040" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead)"/>

                <!-- End -->
                <rect x="300" y="1040" width="200" height="50" fill="#98d8c8" stroke="#6ba9a0" stroke-width="1.5" rx="25" filter="url(#softShadow)"/>
                <text x="400" y="1070" font-size="14" font-weight="bold" text-anchor="middle" fill="white">✓ COMPLETE</text>

                <!-- Arrow marker definition -->
                <defs>
                    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
                        <polygon points="0 0, 10 5, 0 10" fill="#8fa6bb" />
                    </marker>
                </defs>
            </svg>