<svg viewBox="0 0 800 900" width="800" height="900">
                <defs>
                    <filter id="softShadow3" x="-50%" y="-50%" width="200%" height="200%">
                        <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
                    </filter>
                </defs>
                <!-- Title -->
                <text x="400" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#5a6f8f">
                    RISK DETECTION - 25 BUSINESS RULES
                </text>

                <!-- User Input -->
                <rect x="300" y="60" width="200" height="50" fill="#98d8c8" stroke="#6ba9a0" stroke-width="1.5" rx="25" filter="url(#softShadow3)"/>
                <text x="400" y="90" font-size="13" font-weight="bold" text-anchor="middle" fill="white">User Enters Data</text>

                <!-- Arrow -->
                <line x1="400" y1="110" x2="400" y2="140" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead3)"/>

                <!-- Check Risks -->
                <rect x="300" y="140" width="200" height="50" fill="#d9a896" stroke="#b08070" stroke-width="1.5" rx="5" filter="url(#softShadow3)"/>
                <text x="400" y="170" font-size="12" font-weight="bold" text-anchor="middle" fill="white">check_risks(slots)</text>

                <!-- Arrow -->
                <line x1="400" y1="190" x2="400" y2="220" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead3)"/>

                <!-- CRITICAL -->
                <rect x="50" y="220" width="180" height="120" fill="#d9a89f" stroke="#b08070" stroke-width="1.5" rx="5" filter="url(#softShadow3)"/>
                <text x="140" y="245" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CRITICAL 🚨</text>
                <text x="140" y="265" font-size="10" text-anchor="middle" fill="white">R03: Long-term</text>
                <text x="140" y="280" font-size="10" text-anchor="middle" fill="white">+ no indexation</text>
                <text x="140" y="295" font-size="10" text-anchor="middle" fill="white">R07: No TTTR</text>
                <text x="140" y="310" font-size="10" text-anchor="middle" fill="white">defined</text>

                <!-- HIGH -->
                <rect x="310" y="220" width="180" height="120" fill="#d9b896" stroke="#b09070" stroke-width="1.5" rx="5" filter="url(#softShadow3)"/>
                <text x="400" y="245" font-size="12" font-weight="bold" text-anchor="middle" fill="white">HIGH ⚠️</text>
                <text x="400" y="265" font-size="10" text-anchor="middle" fill="white">R01: Provider-led</text>
                <text x="400" y="280" font-size="10" text-anchor="middle" fill="white">wayleaves</text>
                <text x="400" y="295" font-size="10" text-anchor="middle" fill="white">R02: High-risk</text>
                <text x="400" y="310" font-size="10" text-anchor="middle" fill="white">sites (railway)</text>

                <!-- MEDIUM -->
                <rect x="570" y="220" width="180" height="120" fill="#d9c89c" stroke="#b09070" stroke-width="1.5" rx="5" filter="url(#softShadow3)"/>
                <text x="660" y="245" font-size="12" font-weight="bold" text-anchor="middle" fill="white">MEDIUM ⚠️</text>
                <text x="660" y="265" font-size="10" text-anchor="middle" fill="white">R08: TTTR < 12h</text>
                <text x="660" y="280" font-size="10" text-anchor="middle" fill="white">R09: 100%</text>
                <text x="660" y="295" font-size="10" text-anchor="middle" fill="white">service credits</text>
                <text x="660" y="310" font-size="10" text-anchor="middle" fill="white">at risk</text>

                <!-- Arrows down -->
                <line x1="140" y1="340" x2="140" y2="380" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead3)"/>
                <line x1="400" y1="340" x2="400" y2="380" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead3)"/>
                <line x1="660" y1="340" x2="660" y2="380" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead3)"/>

                <!-- Collect -->
                <text x="400" y="370" font-size="11" font-weight="bold" text-anchor="middle" fill="#5a6f8f">COLLECT INTO warnings[]</text>

                <!-- Arrow -->
                <line x1="400" y1="400" x2="400" y2="440" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead3)"/>

                <!-- Recommendation -->
                <rect x="150" y="440" width="500" height="80" fill="#e0d9e8" stroke="#8b7e96" stroke-width="1.5" rx="5" filter="url(#softShadow3)"/>
                <text x="400" y="465" font-size="12" font-weight="bold" text-anchor="middle" fill="#5a6f8f">RECOMMENDATIONS GENERATED</text>
                <text x="400" y="485" font-size="10" text-anchor="middle" fill="#5a6f8f">For each risk:</text>
                <text x="400" y="502" font-size="10" text-anchor="middle" fill="#5a6f8f">Show rule ID + severity + actionable message</text>

                <!-- Arrow -->
                <line x1="400" y1="520" x2="400" y2="550" stroke="#8fa6bb" stroke-width="2" marker-end="url(#arrowhead3)"/>

                <!-- Display -->
                <rect x="200" y="550" width="400" height="60" fill="#98d8c8" stroke="#6ba9a0" stroke-width="1.5" rx="5" filter="url(#softShadow3)"/>
                <text x="400" y="575" font-size="12" font-weight="bold" text-anchor="middle" fill="white">DISPLAY IN UI</text>
                <text x="400" y="595" font-size="10" text-anchor="middle" fill="white">Alongside LLM response for user awareness</text>

                <!-- Examples section -->
                <text x="400" y="650" font-size="14" font-weight="bold" text-anchor="middle" fill="#7b68ee">
                    Sample Risk Rules (out of 25)
                </text>

                <!-- Rules list -->
                <rect x="50" y="670" width="700" height="200" fill="#f8f9fb" stroke="#e0e0e0" stroke-width="1" rx="5"/>
                
                <text x="70" y="690" font-size="11" font-weight="bold" fill="#d9a89f">🚨 R03 CRITICAL:</text>
                <text x="90" y="707" font-size="10" fill="#5a6f8f">Term ≥ 3 years + no inflation indexation = financial risk exposure</text>
                
                <text x="70" y="730" font-size="11" font-weight="bold" fill="#d9b896">⚠️ R01 HIGH:</text>
                <text x="90" y="747" font-size="10" fill="#5a6f8f">Provider-led wayleave applications = control & timeline risk to provider</text>
                
                <text x="70" y="770" font-size="11" font-weight="bold" fill="#d9b896">⚠️ R10 HIGH:</text>
                <text x="90" y="787" font-size="10" fill="#5a6f8f">No early termination fee = unprotected exit from poor performing service</text>
                
                <text x="70" y="810" font-size="11" font-weight="bold" fill="#d9c89c">⚠️ R08 MEDIUM:</text>
                <text x="90" y="827" font-size="10" fill="#5a6f8f">TTTR < 12 hours = aggressive SLA requiring high-cost spares inventory</text>

                <defs>
                    <marker id="arrowhead3" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
                        <polygon points="0 0, 10 5, 0 10" fill="#8fa6bb" />
                    </marker>
                </defs>
            </svg>